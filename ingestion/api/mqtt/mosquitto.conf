log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all
log_timestamp true

listener 1883 0.0.0.0
listener 9001 0.0.0.0
protocol websockets

allow_anonymous true
max_keepalive 120

# Topic ACL for GeoGuard
# Sensors publish to: geoguard/sensor/data/{sensor_id}
# Backend subscribes to: geoguard/sensor/data/#
